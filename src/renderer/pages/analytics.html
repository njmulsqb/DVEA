<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Analytics Dashboard</title>
    <meta http-equiv="Content-Security-Policy" content="script-src *" />
    <link rel="stylesheet" href="../styles/style.css" />
    <style>
      body { background: #f8fafc; }
      .dash-header {
        background: #fff;
        border-bottom: 1px solid #e0e7ff;
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .dash-header h1 { margin: 0; font-size: 1.2rem; color: #2d2b6e; font-weight: 700; }
      .dash-badge {
        background: #ede9fe;
        color: #5755d9;
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.2rem 0.6rem;
        border-radius: 12px;
      }
      .dash-wrap { max-width: 860px; margin: 1.5rem auto; padding: 0 1.5rem 2rem; }
      .stat-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
      .stat-card {
        flex: 1;
        background: #fff;
        border: 1px solid #e0e7ff;
        border-radius: 10px;
        padding: 1rem 1.25rem;
        box-shadow: 0 1px 4px rgba(87, 85, 217, 0.05);
      }
      .stat-label { font-size: 0.78rem; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
      .stat-value { font-size: 1.6rem; font-weight: 700; color: #2d2b6e; margin-top: 0.25rem; }
    </style>
  </head>
  <body>
    <div id="csp-banner" class="xss-explanation" style="display: none; margin: 0; border-radius: 0; border-left: none; border-right: none; border-top: none;"></div>

    <div class="dash-header">
      <h1>Analytics Dashboard</h1>
      <span class="dash-badge">Live</span>
    </div>

    <div class="dash-wrap">
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-label">Total Sessions</div>
          <div class="stat-value">25</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active Users</div>
          <div class="stat-value">3</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg. Duration</div>
          <div class="stat-value">4m 12s</div>
        </div>
      </div>

      <section class="panel">
        <div class="panel-header"><h2>Recent Conversation Participants</h2></div>
        <div class="panel-body">
          <table class="table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Sessions</th>
                <th>Last Active</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td id="participantName">Loading…</td>
                <td>12</td>
                <td>Just now</td>
              </tr>
              <tr>
                <td>Alice Chen</td>
                <td>8</td>
                <td>2 hours ago</td>
              </tr>
              <tr>
                <td>Bob Martinez</td>
                <td>5</td>
                <td>Yesterday</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>

    <script src="../js/analytics.js"></script>
  </body>
</html>
